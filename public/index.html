<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#c1121f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Blaze Cards</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <!-- Toast notifications -->
  <div id="toast-container" aria-live="polite"></div>

  <!-- ═══════════════════════════════ MENU ═══════════════════════════════ -->
  <section id="screen-menu" class="screen active">
    <div class="menu-bg">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
    </div>
    <div class="menu-container">
      <div class="logo-section">
        <div class="logo-badge">
          <span class="logo-fire">🔥</span>
          <h1 class="logo-title">BLAZE<br>CARDS</h1>
        </div>
        <p class="logo-sub">UNO Multiplayer</p>
      </div>

      <div class="menu-card">
        <div class="form-group">
          <label class="form-label" for="nickname">Apelido</label>
          <input id="nickname" type="text" class="input" placeholder="Seu nome aqui..." maxlength="20" autocomplete="off" spellcheck="false">
        </div>

        <button id="btn-create" class="btn btn-primary btn-lg">
          <span class="btn-icon">✚</span> CRIAR SALA
        </button>

        <div class="divider"><span>ou entre numa sala</span></div>

        <div class="join-row">
          <input id="room-code" type="text" class="input code-input" placeholder="CÓDIGO" maxlength="6"
                 autocomplete="off" autocapitalize="characters" spellcheck="false">
          <button id="btn-join" class="btn btn-secondary">ENTRAR</button>
        </div>
      </div>
    </div>
  </section>

  <!-- ══════════════════════════════ LOBBY ══════════════════════════════ -->
  <section id="screen-lobby" class="screen">
    <header class="top-bar">
      <button id="btn-leave-lobby" class="btn btn-icon" title="Sair da sala">←</button>
      <div class="room-badge">
        <span class="room-label">Sala</span>
        <strong id="lobby-code" class="room-code">------</strong>
      </div>
      <button id="btn-mute" class="btn btn-icon" title="Silenciar">🔊</button>
    </header>

    <div class="lobby-content">

      <!-- QR Code (host only) -->
      <div id="qr-section" class="qr-section" style="display:none">
        <p class="qr-hint">📱 Mostre o QR para o outro celular entrar:</p>
        <div id="qr-code" class="qr-code-container"></div>
      </div>

      <!-- Players -->
      <div class="section-block">
        <h3 class="section-title">Jogadores</h3>
        <div id="player-list" class="player-list"></div>
      </div>

      <!-- Settings (host only) -->
      <div id="settings-section" class="section-block" style="display:none">
        <h3 class="section-title">Configurações</h3>
        <div id="settings-form" class="settings-form"></div>
      </div>

      <button id="btn-start" class="btn btn-primary btn-lg" disabled>
        INICIAR PARTIDA
      </button>
      <div id="countdown" class="countdown-text"></div>

      <!-- Chat -->
      <div class="section-block">
        <h3 class="section-title">Chat</h3>
        <div id="chat-lobby" class="chat-box"></div>
        <div class="chat-input-row">
          <input id="chat-input" type="text" class="input" placeholder="Mensagem..." maxlength="200">
          <button id="btn-send" class="btn btn-secondary btn-sm">↑</button>
        </div>
      </div>

    </div>
  </section>

  <!-- ════════════════════════════════ GAME ════════════════════════════════ -->
  <section id="screen-game" class="screen">

    <!-- Top bar -->
    <header class="game-topbar">
      <button id="btn-leave-game" class="btn btn-icon" title="Sair do jogo">←</button>
      <div id="turn-status" class="turn-status">Aguardando...</div>
      <button id="btn-mute-game" class="btn btn-icon" title="Silenciar">🔊</button>
    </header>

    <!-- Opponents area -->
    <div id="opponents" class="opponents-area"></div>

    <!-- Center board: draw pile | center info | discard pile -->
    <div class="board">
      <div class="pile-zone" id="draw-pile-zone" role="button" aria-label="Comprar carta">
        <div class="card card-back" id="draw-pile-card">
          <div class="card-back-inner">
            <span class="card-back-text">UNO</span>
          </div>
        </div>
        <div class="pile-label"><span id="draw-count">?</span> cartas</div>
      </div>

      <div class="board-center">
        <div id="color-indicator" class="color-indicator color-red"></div>
        <div id="direction-indicator" class="direction-indicator">↻</div>
        <div id="pending-draw-badge" class="pending-badge" style="display:none"></div>
      </div>

      <div class="pile-zone" id="discard-pile-zone" aria-label="Carta no topo">
        <div id="top-card-slot"></div>
        <div class="pile-label">Descarte</div>
      </div>
    </div>

    <!-- Player hand -->
    <div class="hand-wrapper">
      <div id="my-hand" class="hand"></div>
    </div>

    <!-- Action bar -->
    <div class="action-bar">
      <div id="cut-uno-zone" class="cut-uno-zone"></div>
      <button id="btn-draw" class="btn btn-draw" disabled>COMPRAR</button>
      <button id="btn-uno" class="btn btn-uno" style="display:none">UNO!</button>
    </div>

    <!-- Event log -->
    <div id="event-log" class="event-log"></div>

  </section>

  <!-- ═══════════════════════════ COLOR MODAL ═══════════════════════════ -->
  <div id="color-modal" class="modal" aria-modal="true" role="dialog" aria-label="Escolha uma cor">
    <div class="modal-box">
      <h3 class="modal-title">Escolha uma cor</h3>
      <div class="color-grid">
        <button class="color-btn card-red"    data-color="red">    <span>Vermelho</span></button>
        <button class="color-btn card-blue"   data-color="blue">   <span>Azul</span></button>
        <button class="color-btn card-green"  data-color="green">  <span>Verde</span></button>
        <button class="color-btn card-yellow" data-color="yellow"> <span>Amarelo</span></button>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════ TARGET MODAL ══════════════════════════ -->
  <div id="target-modal" class="modal" aria-modal="true" role="dialog" aria-label="Escolha um alvo">
    <div class="modal-box">
      <h3 class="modal-title">Escolha um alvo</h3>
      <div id="target-list" class="target-list"></div>
      <button class="btn btn-secondary btn-sm" id="btn-cancel-target" style="margin-top:10px;width:100%">Cancelar</button>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="/app.js"></script>
</body>
</html>
